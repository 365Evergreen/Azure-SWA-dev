# axe Accessibility Linter configuration
# Docs: https://marketplace.visualstudio.com/items?itemName=deque-systems.vscode-axe-linter
#
# Severity levels: "error" | "warn" | "off"
# Rules map to axe-core rule IDs: https://dequeuniversity.com/rules/axe/

rules:
  # ── ARIA ──────────────────────────────────────────────────────────────────
  # Attribute values must be valid strings, not boolean JS expressions.
  # Applies to aria-hidden, aria-pressed, aria-selected, aria-expanded, etc.
  aria-valid-attr-value: "error"

  # ARIA attributes used must be valid for the element's role.
  aria-allowed-attr: "error"

  # Required ARIA attributes for a role must be present.
  aria-required-attr: "error"

  # Elements with ARIA roles must contain required child roles.
  aria-required-children: "error"

  # Elements with ARIA roles must be contained by required parent roles.
  aria-required-parent: "error"

  # aria-roledescription must be on elements with an explicit semantic role.
  aria-roledescription: "error"

  # ARIA role values must be valid.
  aria-roles: "error"

  # aria-hidden=true must not be on the document <body>.
  aria-hidden-body: "error"

  # Presentational children of certain roles must not be focusable.
  aria-prohibited-attr: "error"

  # ── Buttons & Interactive Elements ────────────────────────────────────────
  # Buttons must have discernible text (aria-label, aria-labelledby, or content).
  button-name: "error"

  # Input buttons must have discernible text.
  input-button-name: "error"

  #Input buttons must have pressed state when aria-pressed is used.
  input-button-aria-pressed: "error"

  # Links must have discernible text.
  link-name: "error"

  # ── Images ────────────────────────────────────────────────────────────────
  # Images must have non-empty alt text (or alt="" if decorative).
  image-alt: "error"

  # Redundant alt text (same as adjacent text) should be avoided.
  image-redundant-alt: "warn"

  # SVGs exposed to assistive technology must have accessible text.
  svg-img-alt: "error"

  # ── Forms ─────────────────────────────────────────────────────────────────
  # Form inputs must have associated labels.
  label: "error"

  # Select elements must have labels.
  select-name: "error"

  # ── Keyboard & Focus ──────────────────────────────────────────────────────
  # scrollable regions must be keyboard-accessible.
  scrollable-region-focusable: "warn"

  # Interactive elements must not be nested (e.g. button inside button).
  nested-interactive: "error"

  # accesskey values must be unique.
  accesskeys: "warn"

  # ── Page Structure ────────────────────────────────────────────────────────
  # Page must have a <title>.
  document-title: "error"

  # <html> must have a lang attribute.
  html-has-lang: "error"

  # lang attribute value must be a valid BCP 47 language tag.
  html-lang-valid: "error"

  # Page must have a main landmark.
  landmark-one-main: "warn"

  # Landmark regions must have unique labels when the same role appears multiple times.
  landmark-unique: "warn"

  # ── Headings ──────────────────────────────────────────────────────────────
  # Heading levels should only increase by one (no skipped levels).
  heading-order: "warn"

  # ── Color & Contrast ──────────────────────────────────────────────────────
  # Text must meet WCAG AA contrast ratio (4.5:1 normal, 3:1 large).
  color-contrast: "warn"

  # ── Tables ────────────────────────────────────────────────────────────────
  # Tables used for layout must not contain <th> or summary/caption.
  table-duplicate-name: "warn"

  # <td> elements in a table with headers must use scope or headers attributes.
  td-headers-attr: "error"

  # Table headers must have non-empty text.
  th-has-data-cells: "error"
