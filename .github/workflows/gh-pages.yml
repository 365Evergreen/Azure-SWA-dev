name: Build and Deploy to GitHub Pages

on:
  push:
    branches: ["dev"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: 365-evergreen-web-refresh
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Build
        working-directory: 365-evergreen-web-refresh
        run: pnpm build
        env:
          VITE_BASE_PATH: /Azure-SWA-dev/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 365-evergreen-web-refresh/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

